<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WalletPair E2E — Wallet</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d1117; --surface: #161b22; --border: #30363d; --text: #e6edf3;
  --muted: #8b949e; --green: #3fb950; --amber: #d29922; --red: #f85149; --blue: #58a6ff;
  --font: system-ui, -apple-system, sans-serif; --mono: 'SF Mono', 'Fira Code', monospace;
  --radius: 8px;
}
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; padding: 24px; }
main { max-width: 640px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }
header { font-size: 20px; font-weight: 600; padding-bottom: 8px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 12px; }
.field { margin-bottom: 8px; }
.label { font-size: 12px; color: var(--muted); }
.value { font-family: var(--mono); font-size: 13px; color: var(--text); word-break: break-all; }
.value.green { color: var(--green); }
.status { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
.dot.waiting { background: var(--amber); }
.dot.connected { background: var(--green); }
.dot.closed { background: var(--red); }
#log { max-height: 280px; overflow-y: auto; font-family: var(--mono); font-size: 12px; color: var(--muted); }
.log-entry { padding: 2px 0; border-bottom: 1px solid var(--border); }
</style>
</head>
<body>
<main>
  <header>
    <span>WalletPair E2E &mdash; Wallet</span>
    <span class="status"><span class="dot" id="dot"></span><span id="phase-text">Idle</span></span>
  </header>

  <section>
    <h3>Wallet State</h3>
    <div class="field">
      <div class="label">ETH Address</div>
      <div class="value green" id="eth-addr">--</div>
    </div>
    <div class="field">
      <div class="label">Fingerprint</div>
      <div class="value" id="fingerprint">--</div>
    </div>
    <div class="field">
      <div class="label">Pending Requests</div>
      <div class="value" id="pending-count">0</div>
    </div>
  </section>

  <section>
    <h3>Protocol Log</h3>
    <div id="log"></div>
  </section>
</main>

<script type="module">
// ---------------------------------------------------------------------------
// Crypto imports (same as walletpair-examples/wallet.html)
// ---------------------------------------------------------------------------
import { x25519 } from 'https://esm.sh/@noble/curves@1.8.1/ed25519';
import { secp256k1 } from 'https://esm.sh/@noble/curves@1.8.1/secp256k1';
import { hkdf } from 'https://esm.sh/@noble/hashes@1.7.1/hkdf';
import { sha256 } from 'https://esm.sh/@noble/hashes@1.7.1/sha256';
import { hmac } from 'https://esm.sh/@noble/hashes@1.7.1/hmac';
import { keccak_256 } from 'https://esm.sh/@noble/hashes@1.7.1/sha3';
import { chacha20poly1305 } from 'https://esm.sh/@noble/ciphers@1.2.1/chacha';
import { bytesToHex, hexToBytes, utf8ToBytes, concatBytes } from 'https://esm.sh/@noble/hashes@1.7.1/utils';
import canonicalize from 'https://esm.sh/canonicalize@2.0.0';

// ---------------------------------------------------------------------------
// Base64url helpers
// ---------------------------------------------------------------------------
function b64urlEncode(bytes) {
  const chunks = [];
  for (let i = 0; i < bytes.length; i += 8192) {
    chunks.push(String.fromCharCode.apply(null, bytes.subarray(i, i + 8192)));
  }
  return btoa(chunks.join('')).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}
function b64urlDecode(str) {
  const b64 = str.replace(/-/g, '+').replace(/_/g, '/');
  return Uint8Array.from(atob(b64 + '='.repeat((4 - b64.length % 4) % 4)), c => c.charCodeAt(0));
}

// ---------------------------------------------------------------------------
// WalletPair v1 crypto (replicated from wallet.html)
// ---------------------------------------------------------------------------

// Length-prefixed encoding: uint16_be(len) || utf8(s)
function lp(s) {
  const bytes = new TextEncoder().encode(s);
  const len = new Uint8Array(2);
  new DataView(len.buffer).setUint16(0, bytes.length);
  return concatBytes(len, bytes);
}

// Canonical JSON (RFC 8785)
function canonicalJson(value) {
  return canonicalize(value) ?? 'null';
}

function deriveRootKey(sharedSecret, channelIdHex) {
  return hkdf(sha256, sharedSecret, hexToBytes(channelIdHex), 'walletpair-v1 root', 32);
}

function deriveJoinEncryptionKey(rootKey, channelIdHex) {
  return hkdf(sha256, rootKey, hexToBytes(channelIdHex), 'walletpair-v1 join-encryption', 32);
}

function deriveTranscriptHash(channelIdHex, dappPubKeyB64, walletPubKeyB64, capabilities, meta, dappName) {
  return sha256(concatBytes(
    utf8ToBytes('walletpair-v1-transcript'),
    hexToBytes(channelIdHex),
    lp(dappPubKeyB64),
    lp(walletPubKeyB64),
    lp(canonicalJson(capabilities)),
    lp(canonicalJson(meta)),
    lp(dappName || '')
  ));
}

function deriveDirectionalKeys(rootKey, transcriptHash) {
  const dappToWalletKey = hkdf(sha256, rootKey, transcriptHash, 'walletpair-v1 dapp-to-wallet', 32);
  const walletToDappKey = hkdf(sha256, rootKey, transcriptHash, 'walletpair-v1 wallet-to-dapp', 32);
  return { dappToWalletKey, walletToDappKey };
}

function computeSessionFingerprint(channelIdHex, dappPubKeyB64) {
  const hash = sha256(concatBytes(utf8ToBytes('walletpair-v1-session-fingerprint'), hexToBytes(channelIdHex), b64urlDecode(dappPubKeyB64)));
  const view = new DataView(hash.buffer, hash.byteOffset, 4);
  return (view.getUint32(0) % 10000).toString().padStart(4, '0');
}

// Build AAD per spec: channel_id_bytes || type_byte || lp(from) || lp(id)
function buildAad(channelIdHex, typeByte, from, id) {
  return concatBytes(hexToBytes(channelIdHex), new Uint8Array([typeByte]), lp(from), lp(id));
}

// sealed_join: random nonce, AAD = channel_id_bytes || 0x04
function sealJoin(joinEncKey, channelIdHex, data) {
  const nonce = crypto.getRandomValues(new Uint8Array(12));
  const plaintext = utf8ToBytes(canonicalJson(data));
  const aad = concatBytes(hexToBytes(channelIdHex), new Uint8Array([0x04]));
  const ciphertext = chacha20poly1305(joinEncKey, nonce, aad).encrypt(plaintext);
  return b64urlEncode(concatBytes(nonce, ciphertext));
}

// Type bytes for AAD
const TYPE_REQ = 0x01;
const TYPE_RES = 0x02;
const TYPE_EVT = 0x03;

function sealPayload(trafficKey, channelIdHex, seq, data, typeByte, from, id) {
  const seqBytes = new Uint8Array(4);
  new DataView(seqBytes.buffer).setUint32(0, seq);
  const nonce = hmac(sha256, trafficKey, seqBytes).slice(0, 12);
  const plaintext = utf8ToBytes(JSON.stringify(data));
  const aad = buildAad(channelIdHex, typeByte, from, id);
  const ciphertext = chacha20poly1305(trafficKey, nonce, aad).encrypt(plaintext);
  return b64urlEncode(concatBytes(seqBytes, ciphertext));
}

function unsealPayload(trafficKey, channelIdHex, sealed, typeByte, from, id) {
  const bytes = b64urlDecode(sealed);
  const seqBytes = bytes.slice(0, 4);
  const ciphertext = bytes.slice(4);
  const nonce = hmac(sha256, trafficKey, seqBytes).slice(0, 12);
  const aad = buildAad(channelIdHex, typeByte, from, id);
  const plaintext = chacha20poly1305(trafficKey, nonce, aad).decrypt(ciphertext);
  const seq = new DataView(seqBytes.buffer, seqBytes.byteOffset, 4).getUint32(0);
  return { seq, data: JSON.parse(new TextDecoder().decode(plaintext)) };
}

// ---------------------------------------------------------------------------
// Ethereum helpers
// ---------------------------------------------------------------------------
function privateKeyToAddress(privKeyHex) {
  const pubKey = secp256k1.getPublicKey(hexToBytes(privKeyHex), false);
  return '0x' + bytesToHex(keccak_256(pubKey.slice(1)).slice(-20));
}

function personalSign(privKeyHex, message) {
  const msgBytes = typeof message === 'string' ? utf8ToBytes(message) : message;
  const prefix = utf8ToBytes(`\x19Ethereum Signed Message:\n${msgBytes.length}`);
  const hash = keccak_256(concatBytes(prefix, msgBytes));
  const sig = secp256k1.sign(hash, hexToBytes(privKeyHex));
  const r = sig.r.toString(16).padStart(64, '0');
  const s = sig.s.toString(16).padStart(64, '0');
  const v = (sig.recovery + 27).toString(16).padStart(2, '0');
  return '0x' + r + s + v;
}

function signTypedDataHash(privKeyHex, typedData) {
  // EIP-712: hash = keccak256(0x19 0x01 || domainSeparator || structHash)
  // For E2E testing we sign the keccak of the canonical JSON representation
  const data = typeof typedData === 'string' ? JSON.parse(typedData) : typedData;
  const encoded = utf8ToBytes(canonicalJson(data));
  const hash = keccak_256(encoded);
  const sig = secp256k1.sign(hash, hexToBytes(privKeyHex));
  const r = sig.r.toString(16).padStart(64, '0');
  const s = sig.s.toString(16).padStart(64, '0');
  const v = (sig.recovery + 27).toString(16).padStart(2, '0');
  return '0x' + r + s + v;
}

// ---------------------------------------------------------------------------
// DOM refs
// ---------------------------------------------------------------------------
const dotEl = document.getElementById('dot');
const phaseTextEl = document.getElementById('phase-text');
const ethAddrEl = document.getElementById('eth-addr');
const fingerprintEl = document.getElementById('fingerprint');
const pendingCountEl = document.getElementById('pending-count');
const logEl = document.getElementById('log');

function appendLog(text) {
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.textContent = text;
  logEl.appendChild(entry);
  logEl.scrollTop = logEl.scrollHeight;
}

// ---------------------------------------------------------------------------
// Wallet State
// ---------------------------------------------------------------------------
const S = {
  ws: null,
  channelId: null,
  privKey: null,        // X25519 private key
  pubKey: null,         // X25519 public key
  pubKeyB64: null,
  remotePubKey: null,   // dApp X25519 public key (raw bytes)
  remotePubKeyB64: null,
  rootKey: null,
  sendKey: null,        // wallet_to_dapp_key
  recvKey: null,        // dapp_to_wallet_key
  sendSeq: 0,
  recvSeq: -1,
  ethKey: null,         // secp256k1 private key hex
  ethAddr: null,
  relayUrl: null,
  dappName: null,
  phase: 'idle',
  fingerprint: null,
  pendingReqs: [],
  intentionalClose: false,
  capabilities: null,
  meta: null,
};

function setPhase(phase) {
  S.phase = phase;
  const dotClass = { connected: 'connected', closed: 'closed', idle: '', waiting: 'waiting' };
  dotEl.className = 'dot ' + (dotClass[phase] || '');
  phaseTextEl.textContent = phase.charAt(0).toUpperCase() + phase.slice(1);
}

// ---------------------------------------------------------------------------
// Protocol: parse pairing URI
// ---------------------------------------------------------------------------
function parsePairingUri(uri) {
  const params = new URLSearchParams(uri.replace(/^walletpair:\?/, ''));
  const ch = params.get('ch'), pubkey = params.get('pubkey'), relay = params.get('relay');
  const name = params.get('name') || '';
  if (!ch || !pubkey || !relay) throw new Error('Invalid pairing URI');
  return { ch, pubkey, relay, name };
}

// ---------------------------------------------------------------------------
// Protocol: WebSocket send
// ---------------------------------------------------------------------------
function sendRaw(msg) {
  if (!S.ws || S.ws.readyState !== WebSocket.OPEN) return;
  S.ws.send(JSON.stringify(msg));
  appendLog('[OUT] ' + msg.t + (msg.body?.id ? ' id=' + msg.body.id : ''));
}

// ---------------------------------------------------------------------------
// Protocol: handle incoming messages
// ---------------------------------------------------------------------------
function handleMessage(msg) {
  const body = msg.body || {};
  switch (msg.t) {
    case 'ready':
      if (body.state === 'waiting') {
        setPhase('waiting');
        appendLog('[IN] ready state=waiting');
      } else if (body.state === 'connected') {
        setPhase('connected');
        appendLog('[IN] ready state=connected');
      }
      break;

    case 'req': {
      let method = '(unknown)';
      let params = {};
      if (body.sealed && S.recvKey) {
        try {
          const unsealed = unsealPayload(S.recvKey, S.channelId, body.sealed, TYPE_REQ, msg.from, body.id);
          if (unsealed.seq <= S.recvSeq) {
            appendLog('[ERR] seq rejected: ' + unsealed.seq);
            break;
          }
          S.recvSeq = unsealed.seq;
          method = unsealed.data._method || '(unknown)';
          params = unsealed.data;
          delete params._method;
        } catch (e) {
          appendLog('[ERR] decrypt failed: ' + e.message);
          break;
        }
      }
      appendLog('[IN] req id=' + body.id + ' method=' + method);
      S.pendingReqs.push({ id: body.id, method, params });
      pendingCountEl.textContent = S.pendingReqs.length;
      break;
    }

    case 'ping':
      appendLog('[IN] ping');
      sendRaw({ v: 1, t: 'pong', ch: S.channelId, ts: Date.now(), from: S.pubKeyB64, body: {} });
      break;

    case 'pong':
      appendLog('[IN] pong');
      break;

    case 'terminate':
      appendLog('[IN] terminate reason=' + (body.reason || ''));
      setPhase('closed');
      S.intentionalClose = true;
      break;

    case 'close':
      appendLog('[IN] close reason=' + (body.reason || ''));
      setPhase('closed');
      S.intentionalClose = true;
      break;

    default:
      appendLog('[IN] ' + (msg.t || '?'));
  }
}

// ---------------------------------------------------------------------------
// Exposed API: window.walletE2E
// ---------------------------------------------------------------------------
window.walletE2E = {
  /**
   * Initialize the wallet with a secp256k1 private key.
   * @param {string} privateKeyHex - 64-char hex private key
   * @returns {string} ETH address
   */
  init(privateKeyHex) {
    const hex = privateKeyHex.replace(/^0x/, '').toLowerCase();
    S.ethKey = hex;
    S.ethAddr = privateKeyToAddress(hex);
    ethAddrEl.textContent = S.ethAddr;
    appendLog('init addr=' + S.ethAddr);
    return S.ethAddr;
  },

  /**
   * Join a session from a pairing URI. Performs the full WalletPair v1 handshake.
   * @param {string} pairingUri - walletpair:?ch=...&pubkey=...&relay=...
   * @returns {Promise<string>} session fingerprint (4-digit code)
   */
  joinFromUri(pairingUri) {
    return new Promise((resolve, reject) => {
      try {
        const parsed = parsePairingUri(pairingUri);
        S.channelId = parsed.ch;
        S.remotePubKey = b64urlDecode(parsed.pubkey);
        S.remotePubKeyB64 = parsed.pubkey;
        S.relayUrl = parsed.relay;
        S.dappName = parsed.name;
        S.sendSeq = 0;
        S.recvSeq = -1;
        S.pendingReqs = [];
        S.intentionalClose = false;

        // Generate X25519 key pair
        S.privKey = x25519.utils.randomPrivateKey();
        S.pubKey = x25519.getPublicKey(S.privKey);
        S.pubKeyB64 = b64urlEncode(S.pubKey);

        // Derive root key via X25519 + HKDF
        const shared = x25519.getSharedSecret(S.privKey, S.remotePubKey);
        S.rootKey = deriveRootKey(shared, S.channelId);

        // Session fingerprint
        S.fingerprint = computeSessionFingerprint(S.channelId, S.remotePubKeyB64);
        fingerprintEl.textContent = S.fingerprint;

        // Capabilities and meta for this E2E wallet
        S.capabilities = {
          methods: ['wallet_getAccounts', 'wallet_signMessage', 'wallet_signTypedData', 'wallet_sendTransaction', 'wallet_switchChain'],
          events: ['accountsChanged', 'chainChanged', 'disconnect'],
          chains: ['eip155:100'],
          // Smart contract wallet: advertise Safe proxy runtime so the extension
          // answers eth_getCode with non-empty code for a counterfactual account.
          contractBytecode: '0x608060405273ffffffffffffffffffffffffffffffffffffffff600054167fa619486e0000000000000000000000000000000000000000000000000000000060003514156050578060005260206000f35b3660008037600080366000845af43d6000803e60008114156070573d6000fd5b3d6000f3fea264697066735822122003d1488ee65e08fa41e58e888a9865554c535f2c77126a82cb4c0f917f31441364736f6c63430007060033'
        };
        S.meta = {
          name: 'WalletPair E2E Wallet',
          description: 'E2E test wallet',
          url: location.origin,
          icon: ''
        };

        // Derive join encryption key and sealed_join
        const joinEncKey = deriveJoinEncryptionKey(S.rootKey, S.channelId);
        const joinPayload = { capabilities: S.capabilities, meta: S.meta };
        const sealedJoinStr = sealJoin(joinEncKey, S.channelId, joinPayload);

        // Derive directional traffic keys using transcript hash
        const transcriptHash = deriveTranscriptHash(
          S.channelId, S.remotePubKeyB64, S.pubKeyB64,
          S.capabilities, S.meta, S.dappName
        );
        const keys = deriveDirectionalKeys(S.rootKey, transcriptHash);
        S.sendKey = keys.walletToDappKey;
        S.recvKey = keys.dappToWalletKey;

        // Append ?ch= for CF Worker relay routing (same as SDK's WebSocketTransport)
        let wsUrl = S.relayUrl;
        if (S.channelId && !wsUrl.includes('?ch=')) {
          const sep = wsUrl.includes('?') ? '&' : '?';
          wsUrl = `${wsUrl}${sep}ch=${S.channelId}`;
        }
        appendLog('connecting to ' + wsUrl);

        // Open WebSocket
        const ws = new WebSocket(wsUrl, ['walletpair.v1']);
        S.ws = ws;

        let resolved = false;

        ws.onopen = () => {
          setPhase('waiting');
          const joinMsg = {
            v: 1, t: 'join', ch: S.channelId, ts: Date.now(),
            from: S.pubKeyB64,
            body: {
              sealed_join: sealedJoinStr,
            },
          };
          sendRaw(joinMsg);
          appendLog('join sent, waiting for accept');
        };

        ws.onmessage = (event) => {
          const msg = JSON.parse(event.data);

          // Intercept ready+connected to resolve the promise
          if (msg.t === 'ready' && msg.body?.state === 'connected' && !resolved) {
            resolved = true;
            handleMessage(msg);
            resolve(S.fingerprint);
            return;
          }
          // Also resolve on waiting (dApp hasn't accepted yet, but we're joined)
          if (msg.t === 'ready' && msg.body?.state === 'waiting' && !resolved) {
            handleMessage(msg);
            // Don't resolve yet, wait for connected
            return;
          }

          handleMessage(msg);
        };

        ws.onclose = () => {
          if (!S.intentionalClose && S.phase !== 'closed') {
            appendLog('ws closed unexpectedly');
            setPhase('closed');
          }
          if (!resolved) {
            resolved = true;
            reject(new Error('WebSocket closed before connected'));
          }
        };

        ws.onerror = (err) => {
          appendLog('ws error: ' + (err.message || err.type || 'unknown'));
          if (!resolved) {
            resolved = true;
            reject(new Error('WebSocket error: ' + (err.message || 'connection failed to ' + wsUrl)));
          }
        };
      } catch (e) {
        reject(e);
      }
    });
  },

  /**
   * Get current phase.
   */
  getPhase() {
    return S.phase;
  },

  /**
   * Get session fingerprint.
   */
  getFingerprint() {
    return S.fingerprint;
  },

  /**
   * Get pending requests.
   */
  getPendingRequests() {
    return S.pendingReqs.map(r => ({ id: r.id, method: r.method, params: r.params }));
  },

  /**
   * Approve a pending request by ID. Auto-handles based on method.
   */
  approveRequest(id) {
    const req = S.pendingReqs.find(r => r.id === id);
    if (!req) throw new Error('Request not found: ' + id);

    let resultData;
    switch (req.method) {
      case 'wallet_getAccounts':
        resultData = { accounts: [{ address: S.ethAddr, chains: ['eip155:100'] }] };
        break;
      case 'wallet_signMessage': {
        const message = req.params.message || '';
        resultData = { signature: personalSign(S.ethKey, message), address: S.ethAddr };
        break;
      }
      case 'wallet_signTypedData': {
        const typedData = req.params.typedData || req.params.data || '';
        resultData = { signature: signTypedDataHash(S.ethKey, typedData) };
        break;
      }
      case 'wallet_sendTransaction': {
        // Simulate: return a random tx hash
        const randomHex = bytesToHex(crypto.getRandomValues(new Uint8Array(32)));
        resultData = { txHash: '0x' + randomHex };
        break;
      }
      case 'wallet_switchChain': {
        const chain = req.params.chain || 'eip155:100';
        resultData = { chain };
        // Push chainChanged event to dApp
        this.pushEvent('chainChanged', { chain });
        break;
      }
      default:
        resultData = { status: 'approved' };
    }

    // Wrap in { _ok: true, _result: ... } per protocol
    const payload = { _ok: true, _result: resultData };
    const sealed = sealPayload(S.sendKey, S.channelId, S.sendSeq++, payload, TYPE_RES, S.pubKeyB64, req.id);
    sendRaw({ v: 1, t: 'res', ch: S.channelId, ts: Date.now(), from: S.pubKeyB64, body: { id: req.id, sealed } });

    S.pendingReqs = S.pendingReqs.filter(r => r.id !== id);
    pendingCountEl.textContent = S.pendingReqs.length;
    appendLog('approved ' + req.method + ' id=' + id);
  },

  /**
   * Reject a pending request by ID.
   */
  rejectRequest(id) {
    const req = S.pendingReqs.find(r => r.id === id);
    if (!req) throw new Error('Request not found: ' + id);

    const payload = { _ok: false, code: 'user_rejected', message: 'User rejected the request' };
    const sealed = sealPayload(S.sendKey, S.channelId, S.sendSeq++, payload, TYPE_RES, S.pubKeyB64, req.id);
    sendRaw({ v: 1, t: 'res', ch: S.channelId, ts: Date.now(), from: S.pubKeyB64, body: { id: req.id, sealed } });

    S.pendingReqs = S.pendingReqs.filter(r => r.id !== id);
    pendingCountEl.textContent = S.pendingReqs.length;
    appendLog('rejected id=' + id);
  },

  /**
   * Push an event to the dApp.
   */
  pushEvent(name, data) {
    if (S.phase !== 'connected') throw new Error('Not connected');
    const evtId = 'evt-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6);
    const evtData = { _event: name, ...data };
    const sealed = sealPayload(S.sendKey, S.channelId, S.sendSeq++, evtData, TYPE_EVT, S.pubKeyB64, evtId);
    sendRaw({ v: 1, t: 'evt', ch: S.channelId, ts: Date.now(), from: S.pubKeyB64, body: { id: evtId, sealed } });
    appendLog('pushed event ' + name);
  },

  /**
   * Close the session.
   */
  close() {
    S.intentionalClose = true;
    if (S.ws && S.ws.readyState === WebSocket.OPEN) {
      sendRaw({ v: 1, t: 'close', ch: S.channelId, ts: Date.now(), from: S.pubKeyB64, body: { reason: 'normal' } });
      S.ws.close();
    }
    setPhase('closed');
    appendLog('session closed');
  }
};

appendLog('wallet-e2e loaded, call walletE2E.init(privKeyHex) then walletE2E.joinFromUri(uri)');
</script>
</body>
</html>
