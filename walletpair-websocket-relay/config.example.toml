# WalletPair WebSocket Relay configuration
#
# The relay loads configuration from the file path specified by the
# WALLETPAIR_CONFIG environment variable. If unset, it tries "config.toml"
# in the working directory. If no file is found, all defaults are used.
#
# Every option below shows its default value. Uncomment and modify as needed.

# Address and port to bind the HTTP/WebSocket server.
# listen_addr = "0.0.0.0:8080"

# URL path for the WebSocket endpoint.
# websocket_path = "/v1"

# Maximum number of concurrent WebSocket connections. New connections beyond
# this limit receive HTTP 503. Each connection uses one tokio task and a
# small outbound message buffer.
# max_connections = 10000

# Maximum number of concurrent channels. The /readyz endpoint returns 503
# when this limit is reached. Each channel holds state for two peers.
# max_channels = 50000

# Maximum size (in bytes) of a single WebSocket text frame. Messages
# exceeding this limit are rejected with close reason "payload_too_large".
# max_message_bytes = 65536

# Per-connection outbound message buffer size. If a peer's buffer is full
# when the relay tries to forward a message, the message is dropped and
# the slow consumer metric is incremented.
# outbound_queue_size = 64

# Maximum number of pending (unanswered) requests per channel. When the
# limit is reached, new "req" messages are rejected with close reason
# "invalid_state".
# pending_request_limit = 32

# Seconds before an unpaired channel (WaitingForWallet or PendingAccept)
# is cleaned up. Set this to how long you expect the QR code / pairing
# link to remain valid.
# unpaired_channel_ttl_secs = 300

# Seconds before a connected channel is cleaned up. Set based on expected
# session duration. The default of 86400 (24 hours) is generous for most
# signing use cases.
# connected_channel_ttl_secs = 86400

# How often (in seconds) the background task runs to remove expired
# channels. Lower values detect expired channels faster but use more CPU.
# cleanup_interval_secs = 30

# Seconds to wait during graceful shutdown for in-flight writes to flush
# before the process exits.
# graceful_shutdown_timeout_secs = 10

# Log level filter. Supports: trace, debug, info, warn, error.
# Can also be overridden by the RUST_LOG environment variable.
# log_level = "info"

# Whether the /metrics endpoint serves Prometheus metrics. Set to false
# to disable the endpoint entirely (returns 404).
# metrics_enabled = true

# Optional list of allowed CORS origins. If omitted, no CORS headers are
# set. Specify origins to allow browser-based dApps to connect directly.
# allowed_origins = ["https://app.example.com", "http://localhost:3000"]
