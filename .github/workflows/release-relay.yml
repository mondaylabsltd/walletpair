name: Release Relay

on:
  push:
    tags:
      - 'relay-v*'

permissions:
  contents: write

concurrency:
  group: release-relay-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - name: Linux arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
          - name: macOS Intel
            runner: macos-15-intel
            target: x86_64-apple-darwin
            archive: tar.gz
          - name: macOS Apple Silicon
            runner: macos-15
            target: aarch64-apple-darwin
            archive: tar.gz
          - name: Windows x86_64
            runner: windows-2025
            target: x86_64-pc-windows-msvc
            archive: zip
          - name: Windows arm64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            archive: zip
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    defaults:
      run:
        working-directory: walletpair-relay
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            walletpair-relay/target
          key: relay-release-${{ matrix.target }}-${{ hashFiles('walletpair-relay/Cargo.lock') }}

      - name: Verify tag matches Cargo version
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#relay-v}"
          cargo_version="$(cargo metadata --locked --no-deps --format-version 1 | jq --raw-output '.packages[] | select(.name == "walletpair-relay") | .version')"
          test "$tag_version" = "$cargo_version"

      - name: Build release executable
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package executable
        id: package
        shell: bash
        env:
          ARCHIVE: ${{ matrix.archive }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          executable="walletpair-relay"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            executable="${executable}.exe"
          fi

          mkdir -p dist/package
          cp "target/${TARGET}/release/${executable}" "dist/package/${executable}"
          asset="walletpair-relay-${GITHUB_REF_NAME}-${TARGET}"

          if [[ "$ARCHIVE" == "zip" ]]; then
            powershell -NoProfile -Command "Compress-Archive -Path 'dist/package/${executable}' -DestinationPath 'dist/${asset}.zip' -Force"
            archive_path="dist/${asset}.zip"
          else
            tar -C dist/package -czf "dist/${asset}.tar.gz" "${executable}"
            archive_path="dist/${asset}.tar.gz"
          fi

          echo "asset_name=${asset}" >> "$GITHUB_OUTPUT"
          echo "archive_path=walletpair-relay/${archive_path}" >> "$GITHUB_OUTPUT"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.asset_name }}
          path: ${{ steps.package.outputs.archive_path }}
          if-no-files-found: error
          retention-days: 7

  docker-build:
    name: Build Docker image (${{ matrix.name }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux amd64
            runner: ubuntu-24.04
            platform: linux/amd64
            arch: amd64
            target: x86_64-unknown-linux-gnu
          - name: Linux arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
            target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    env:
      IMAGE_NAME: ${{ vars.DOCKERHUB_USERNAME }}/walletpair-relay
      SOURCE_TAG: build-${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Download matching Linux executable
        uses: actions/download-artifact@v4
        with:
          name: walletpair-relay-${{ github.ref_name }}-${{ matrix.target }}
          path: walletpair-relay/dist/artifact

      - name: Extract Linux executable
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          tar -xzf "walletpair-relay/dist/artifact/walletpair-relay-${GITHUB_REF_NAME}-${TARGET}.tar.gz" \
            -C walletpair-relay/dist
          chmod 0555 walletpair-relay/dist/walletpair-relay

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Assemble and push native Docker image
        uses: docker/build-push-action@v7
        with:
          context: walletpair-relay
          file: walletpair-relay/Dockerfile.release
          push: true
          platforms: ${{ matrix.platform }}
          tags: ${{ env.IMAGE_NAME }}:${{ env.SOURCE_TAG }}-${{ matrix.arch }}
          provenance: false

  docker-manifest:
    name: Publish Docker multi-arch manifest
    needs: docker-build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      IMAGE_NAME: ${{ vars.DOCKERHUB_USERNAME }}/walletpair-relay
      SOURCE_TAG: build-${{ github.sha }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=match,pattern=relay-v(.*),group=1
            type=ref,event=tag
            type=raw,value=latest

      - name: Create and push multi-arch manifests
        env:
          TAGS: ${{ steps.metadata.outputs.tags }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            if [[ -n "$tag" ]]; then
              docker buildx imagetools create \
                --tag "$tag" \
                "${IMAGE_NAME}:${SOURCE_TAG}-amd64" \
                "${IMAGE_NAME}:${SOURCE_TAG}-arm64"
            fi
          done <<< "$TAGS"

  publish:
    name: Publish GitHub Release
    needs: [build, docker-manifest]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          # Select only the six archives from the build matrix. Buildx can also
          # emit build-record artifacts, which are not release assets.
          pattern: walletpair-relay-${{ github.ref_name }}-*
          path: dist
          merge-multiple: true

      - name: Create checksums
        working-directory: dist
        run: sha256sum walletpair-relay-* > SHA256SUMS

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --repo "${GITHUB_REPOSITORY}" --generate-notes
