<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WalletPair — dApp</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d1117; --surface: #161b22; --border: #30363d; --text: #e6edf3;
  --muted: #8b949e; --green: #3fb950; --amber: #d29922; --red: #f85149; --blue: #58a6ff;
  --font: system-ui, -apple-system, sans-serif; --mono: 'SF Mono', 'Fira Code', monospace;
  --radius: 8px;
}
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; padding: 24px; }
main { max-width: 640px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }
header { font-size: 20px; font-weight: 600; padding-bottom: 8px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 12px; }
label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 4px; }
input, textarea, select {
  width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); padding: 8px 10px; font-family: var(--mono); font-size: 13px; resize: vertical;
}
input:focus, textarea:focus { outline: none; border-color: var(--blue); }
textarea { min-height: 56px; }
button {
  background: var(--border); color: var(--text); border: none; border-radius: 6px;
  padding: 8px 16px; font-size: 13px; cursor: pointer; font-weight: 500; transition: background 0.15s;
}
button:hover:not(:disabled) { background: var(--muted); }
button:disabled { opacity: 0.4; cursor: default; }
button.primary { background: var(--blue); color: #fff; }
button.primary:hover:not(:disabled) { background: #79c0ff; }
button.danger { background: var(--red); color: #fff; }
.row { display: flex; gap: 8px; align-items: center; }
.status { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
.dot.waiting { background: var(--amber); }
.dot.connected { background: var(--green); }
.dot.closed { background: var(--red); }
.dot.reconnecting { background: var(--amber); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
.code { font-family: var(--mono); font-size: 32px; letter-spacing: 0.2em; font-weight: 700; text-align: center; padding: 16px 0; }
.uri-box { font-family: var(--mono); font-size: 11px; word-break: break-all; background: var(--bg); padding: 10px; border-radius: 6px; margin-bottom: 8px; color: var(--muted); max-height: 80px; overflow-y: auto; }
#log { max-height: 320px; overflow-y: auto; }
.log-entry { font-family: var(--mono); font-size: 12px; padding: 3px 0; border-bottom: 1px solid var(--border); display: flex; gap: 8px; }
.log-entry .dir { flex-shrink: 0; width: 14px; text-align: center; }
.log-entry .dir.out { color: var(--blue); }
.log-entry .dir.in { color: var(--green); }
.log-entry .dir.err { color: var(--red); }
.log-entry .body { word-break: break-all; color: var(--muted); }
.log-entry .type { color: var(--text); font-weight: 500; }
.hidden { display: none !important; }
.mt { margin-top: 10px; }
</style>
</head>
<body>
<main>
  <header>
    <span>WalletPair &mdash; dApp</span>
    <span class="status"><span class="dot" id="dot"></span><span id="statusText">Idle</span></span>
  </header>

  <section>
    <h3>Transport</h3>
    <div class="row" id="transportPicker">
      <button id="btnModeWs" class="primary">WebSocket</button>
      <button id="btnModeBle">Bluetooth</button>
    </div>
    <div id="wsConfig" class="mt">
      <div class="row">
        <input id="relayUrl" value="ws://localhost:8080/v1" placeholder="ws://...">
        <button id="btnConnect" class="primary">Connect</button>
      </div>
    </div>
    <div id="bleConfig" class="hidden mt">
      <div class="row">
        <button id="btnBleCreate" class="primary">Create Channel</button>
        <button id="btnBleScan" class="primary" disabled>Scan for Wallet</button>
      </div>
      <div id="bleStatus" style="color:var(--muted);font-size:12px;margin-top:6px"></div>
    </div>
    <button id="btnReset" class="danger hidden mt">Reset</button>
  </section>

  <section id="secPairing">
    <h3>Pairing</h3>
    <label>Pairing URI (share with wallet)</label>
    <div style="text-align:center;padding:12px 0">
      <canvas id="qrCanvas" width="200" height="200" style="border-radius:8px;display:none"></canvas>
    </div>
    <div class="uri-box" id="pairingUri">--</div>
    <button id="btnCopy" disabled>Copy URI</button>
    <div id="pairingCodeWrap" class="hidden">
      <label class="mt">Pairing Code (verify with wallet)</label>
      <div class="code" id="pairingCode">------</div>
      <div class="row mt">
        <button id="btnAccept" class="primary" disabled>Accept Wallet</button>
        <button id="btnReject" class="danger" disabled>Reject</button>
      </div>
    </div>
  </section>

  <section id="secRequest" class="hidden">
    <h3>Send Request</h3>
    <label>Method</label>
    <select id="method">
      <option value="wallet_getAccounts">wallet_getAccounts</option>
      <option value="wallet_signMessage">wallet_signMessage</option>
      <option value="custom">custom...</option>
    </select>
    <label class="mt">Params (JSON)</label>
    <textarea id="params">{}</textarea>
    <div class="row mt">
      <button id="btnSend" class="primary">Send Request</button>
      <button id="btnPing">Ping</button>
      <button id="btnClose" class="danger">Close</button>
    </div>
  </section>

  <section>
    <h3>Message Log</h3>
    <div id="log"></div>
  </section>
</main>

<script type="module">
// ---------------------------------------------------------------------------
// Crypto imports (noble libraries — minimal, audited, zero-dependency)
// ---------------------------------------------------------------------------
import { x25519 } from 'https://esm.sh/@noble/curves@1.8.1/ed25519';
import { hkdf } from 'https://esm.sh/@noble/hashes@1.7.1/hkdf';
import { sha256 } from 'https://esm.sh/@noble/hashes@1.7.1/sha256';
import { hmac } from 'https://esm.sh/@noble/hashes@1.7.1/hmac';
import { chacha20poly1305 } from 'https://esm.sh/@noble/ciphers@1.2.1/chacha';
import { bytesToHex, hexToBytes, utf8ToBytes, concatBytes } from 'https://esm.sh/@noble/hashes@1.7.1/utils';
import QRCode from 'https://esm.sh/qrcode@1.5.4';

// ---------------------------------------------------------------------------
// Base64url helpers
// ---------------------------------------------------------------------------
function b64urlEncode(bytes) {
  return btoa(String.fromCharCode(...bytes)).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}
function b64urlDecode(str) {
  const b64 = str.replace(/-/g, '+').replace(/_/g, '/');
  return Uint8Array.from(atob(b64 + '='.repeat((4 - b64.length % 4) % 4)), c => c.charCodeAt(0));
}

// ---------------------------------------------------------------------------
// WalletPair crypto (implements protocol Section 7)
// ---------------------------------------------------------------------------
function deriveSessionKey(sharedSecret, channelIdHex) {
  return hkdf(sha256, sharedSecret, hexToBytes(channelIdHex), 'walletpair-v1', 32);
}
function computePairingCode(sessionKey, channelIdHex) {
  const codeBytes = hkdf(sha256, sessionKey, hexToBytes(channelIdHex), 'walletpair-pairing-code', 4);
  const view = new DataView(codeBytes.buffer, codeBytes.byteOffset, 4);
  return (view.getUint32(0) % 1000000).toString().padStart(6, '0');
}
function sealPayload(sessionKey, channelIdHex, seq, data) {
  const seqBytes = new Uint8Array(4);
  new DataView(seqBytes.buffer).setUint32(0, seq);
  const nonce = hmac(sha256, sessionKey, seqBytes).slice(0, 12);
  const plaintext = utf8ToBytes(JSON.stringify(data));
  const ciphertext = chacha20poly1305(sessionKey, nonce, hexToBytes(channelIdHex)).encrypt(plaintext);
  return b64urlEncode(concatBytes(seqBytes, ciphertext));
}
function unsealPayload(sessionKey, channelIdHex, sealed) {
  const bytes = b64urlDecode(sealed);
  const seqBytes = bytes.slice(0, 4);
  const ciphertext = bytes.slice(4);
  const nonce = hmac(sha256, sessionKey, seqBytes).slice(0, 12);
  const plaintext = chacha20poly1305(sessionKey, nonce, hexToBytes(channelIdHex)).decrypt(ciphertext);
  const seq = new DataView(seqBytes.buffer, seqBytes.byteOffset, 4).getUint32(0);
  return { seq, data: JSON.parse(new TextDecoder().decode(plaintext)) };
}

// ---------------------------------------------------------------------------
// BLE constants and framing (Section 19.3 / 19.5)
// ---------------------------------------------------------------------------
const BLE_SERVICE_UUID     = 'e3a10001-7770-4270-8000-000077700001';
const BLE_WRITE_CHAR_UUID  = 'e3a10002-7770-4270-8000-000077700001';
const BLE_NOTIFY_CHAR_UUID = 'e3a10003-7770-4270-8000-000077700001';
const MAX_BLE_FRAGMENT = 182;

function bleFrameMessage(jsonStr) {
  const payload = new TextEncoder().encode(jsonStr);
  const frames = [];
  if (!payload.length) { const f = new Uint8Array(3); f[0] = 0x03; return [f]; }
  for (let off = 0; off < payload.length; off += MAX_BLE_FRAGMENT) {
    const isFirst = off === 0, end = Math.min(off + MAX_BLE_FRAGMENT, payload.length), isLast = end === payload.length;
    const frag = payload.slice(off, end), frame = new Uint8Array(3 + frag.length);
    frame[0] = (isFirst ? 1 : 0) | (isLast ? 2 : 0);
    if (isFirst) { frame[1] = (payload.length >> 8) & 0xff; frame[2] = payload.length & 0xff; }
    frame.set(frag, 3);
    frames.push(frame);
  }
  return frames;
}

class BleDefragmenter {
  constructor() { this.chunks = []; }
  push(data) {
    if (data.byteLength < 3) return null;
    const view = new Uint8Array(data.buffer ?? data);
    const isFirst = !!(view[0] & 1), isLast = !!(view[0] & 2);
    if (isFirst) this.chunks = [view.slice(3)]; else this.chunks.push(view.slice(3));
    if (isLast) { const total = this.chunks.reduce((s, c) => s + c.length, 0); const buf = new Uint8Array(total); let o = 0; for (const c of this.chunks) { buf.set(c, o); o += c.length; } this.chunks = []; return new TextDecoder().decode(buf); }
    return null;
  }
  reset() { this.chunks = []; }
}

const WEB_BLE_SUPPORTED = typeof navigator !== 'undefined' && !!navigator.bluetooth;

// ---------------------------------------------------------------------------
// State persistence (sessionStorage)
// ---------------------------------------------------------------------------
const STORE_KEY = 'wp_dapp';
function saveState() {
  const data = {
    channelId:     S.channelId,
    privKey:       S.privKey ? bytesToHex(S.privKey) : null,
    pubKeyB64:     S.pubKeyB64,
    remotePubKeyB64: S.remotePubKey ? b64urlEncode(S.remotePubKey) : null,
    sessionKey:    S.sessionKey ? bytesToHex(S.sessionKey) : null,
    sendSeq:       S.sendSeq,
    resumeToken:   S.resumeToken,
    relayUrl:      relayUrlEl.value,
    reqCounter:    S.reqCounter,
    paired:        S.paired,
  };
  sessionStorage.setItem(STORE_KEY, JSON.stringify(data));
}
function loadState() {
  try {
    const raw = sessionStorage.getItem(STORE_KEY);
    if (!raw) return false;
    const d = JSON.parse(raw);
    if (!d.channelId || !d.privKey) return false;
    S.channelId = d.channelId;
    S.privKey = hexToBytes(d.privKey);
    S.pubKey = x25519.getPublicKey(S.privKey);
    S.pubKeyB64 = d.pubKeyB64;
    S.remotePubKey = d.remotePubKeyB64 ? b64urlDecode(d.remotePubKeyB64) : null;
    S.sessionKey = d.sessionKey ? hexToBytes(d.sessionKey) : null;
    S.sendSeq = d.sendSeq || 0;
    S.resumeToken = d.resumeToken;
    S.reqCounter = d.reqCounter || 0;
    S.paired = d.paired || false;
    relayUrlEl.value = d.relayUrl || relayUrlEl.value;
    return true;
  } catch { return false; }
}
function clearState() {
  sessionStorage.removeItem(STORE_KEY);
}

// ---------------------------------------------------------------------------
// App State
// ---------------------------------------------------------------------------
const S = {
  ws: null,
  channelId: null,
  privKey: null,        // Uint8Array X25519 private key
  pubKey: null,         // Uint8Array X25519 public key
  pubKeyB64: null,      // base64url
  remotePubKey: null,   // Uint8Array remote public key
  sessionKey: null,     // Uint8Array 32-byte session key
  sendSeq: 0,
  resumeToken: null,
  phase: 'idle',
  reqCounter: 0,
  paired: false,        // true after first successful accept (enables auto-accept)
  intentionalClose: false,
  // Transport mode
  transport: 'ws',      // 'ws' | 'ble'
  // BLE state (Web Bluetooth Central)
  bleDevice: null,
  bleWriteChar: null,
  bleNotifyChar: null,
  bleDefrag: new BleDefragmenter(),
};

const BACKOFF = [1000, 2000, 5000, 10000, 30000];

// ---------------------------------------------------------------------------
// UI references
// ---------------------------------------------------------------------------
const $ = (id) => document.getElementById(id);
const relayUrlEl = $('relayUrl');
const btnConnect = $('btnConnect');
const btnReset = $('btnReset');
const btnModeWs = $('btnModeWs');
const btnModeBle = $('btnModeBle');
const wsConfig = $('wsConfig');
const bleConfig = $('bleConfig');
const btnBleCreate = $('btnBleCreate');
const btnBleScan = $('btnBleScan');
const bleStatusEl = $('bleStatus');
const dot = $('dot');
const statusText = $('statusText');
const pairingUriEl = $('pairingUri');
const qrCanvas = $('qrCanvas');
const btnCopy = $('btnCopy');
const pairingCodeEl = $('pairingCode');
const pairingCodeWrap = $('pairingCodeWrap');
const btnAccept = $('btnAccept');
const btnReject = $('btnReject');
const secRequest = $('secRequest');
const methodSel = $('method');
const paramsEl = $('params');
const btnSend = $('btnSend');
const btnPing = $('btnPing');
const btnClose = $('btnClose');
const logEl = $('log');

// ---------------------------------------------------------------------------
// UI helpers
// ---------------------------------------------------------------------------
function setPhase(phase) {
  S.phase = phase;
  const dotClass = { connected: 'connected', closed: 'closed', idle: '', reconnecting: 'reconnecting' };
  dot.className = 'dot ' + (dotClass[phase] ?? 'waiting');
  statusText.textContent = phase.charAt(0).toUpperCase() + phase.slice(1).replace('_', ' ');
  btnAccept.disabled = phase !== 'pending_accept';
  btnReject.disabled = phase !== 'pending_accept';
  btnCopy.disabled = !S.channelId;
  secRequest.classList.toggle('hidden', phase !== 'connected');
  pairingCodeWrap.classList.toggle('hidden', phase !== 'pending_accept');
  btnReset.classList.toggle('hidden', phase === 'idle');
  btnConnect.classList.toggle('hidden', phase !== 'idle');
}

function log(dir, type, detail = '') {
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  const arrow = dir === 'out' ? '→' : dir === 'in' ? '←' : '✕';
  const cls = dir === 'out' ? 'out' : dir === 'in' ? 'in' : 'err';
  entry.innerHTML = `<span class="dir ${cls}">${arrow}</span><span class="type">${type}</span><span class="body">${detail}</span>`;
  logEl.appendChild(entry);
  logEl.scrollTop = logEl.scrollHeight;
}

async function renderQR(text) {
  try {
    await QRCode.toCanvas(qrCanvas, text, {
      width: 200, margin: 2,
      color: { dark: '#e6edf3', light: '#161b22' },
    });
    qrCanvas.style.display = 'block';
  } catch { qrCanvas.style.display = 'none'; }
}

// ---------------------------------------------------------------------------
// WebSocket connection (handles both fresh connect and reconnect)
// ---------------------------------------------------------------------------
function openWs(onOpen) {
  const url = relayUrlEl.value;
  const ws = new WebSocket(url, ['walletpair.v1']);

  ws.onopen = () => onOpen(ws);

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    handleMessage(msg, ws);
  };

  ws.onclose = () => {
    if (S.intentionalClose) return;
    if (S.phase === 'closed') return;
    log('err', 'ws_close', 'transport disconnected');
    startReconnect();
  };

  ws.onerror = () => {};
  return ws;
}

function sendRaw(msg) {
  if (S.transport === 'ble') {
    sendViaBle(msg);
  } else {
    if (!S.ws || S.ws.readyState !== WebSocket.OPEN) return;
    S.ws.send(JSON.stringify(msg));
  }
  const type = msg.t;
  const detail = type === 'req' ? `id=${msg.id} method=${msg.method}` : type === 'close' ? `reason=${msg.reason}` : '';
  log('out', type, detail);
}

// ---------------------------------------------------------------------------
// BLE Central: Web Bluetooth (dApp connects TO wallet's GATT server)
// ---------------------------------------------------------------------------

async function sendViaBle(msg) {
  if (!S.bleWriteChar) return;
  const frames = bleFrameMessage(JSON.stringify(msg));
  for (const frame of frames) {
    await S.bleWriteChar.writeValueWithoutResponse(frame);
  }
}

async function bleConnect() {
  bleStatusEl.textContent = 'Scanning...';
  try {
    log('out', 'ble', '1. requesting device...');
    // namePrefix matches "WalletPair <DeviceName>" across iOS/Android.
    // services filter works on iOS which includes UUID in ad packet.
    const device = await navigator.bluetooth.requestDevice({
      filters: [
        { namePrefix: 'WalletPair' },
        { services: [BLE_SERVICE_UUID] },
      ],
      optionalServices: [BLE_SERVICE_UUID],
    });
    log('in', 'ble', `2. device selected: ${device.name} (${device.id})`);
    S.bleDevice = device;
    device.addEventListener('gattserverdisconnected', onBleDisconnect);

    bleStatusEl.textContent = 'Connecting GATT...';
    log('out', 'ble', '3. connecting GATT...');
    const server = await device.gatt.connect();
    log('in', 'ble', '4. GATT connected');

    bleStatusEl.textContent = 'Discovering service...';
    log('out', 'ble', `5. getPrimaryService(${BLE_SERVICE_UUID.slice(0,8)}...)`);
    const service = await server.getPrimaryService(BLE_SERVICE_UUID);
    log('in', 'ble', '6. service found');

    log('out', 'ble', '7. getting write characteristic...');
    S.bleWriteChar = await service.getCharacteristic(BLE_WRITE_CHAR_UUID);
    log('in', 'ble', '8. write char OK');

    log('out', 'ble', '9. getting notify characteristic...');
    S.bleNotifyChar = await service.getCharacteristic(BLE_NOTIFY_CHAR_UUID);
    log('in', 'ble', '10. notify char OK');

    log('out', 'ble', '11. subscribing to notifications...');
    await S.bleNotifyChar.startNotifications();
    S.bleNotifyChar.addEventListener('characteristicvaluechanged', onBleNotification);
    log('in', 'ble', '12. subscribed — waiting for wallet join');

    bleStatusEl.textContent = 'BLE connected — waiting for wallet join';
  } catch (err) {
    bleStatusEl.textContent = `BLE error: ${err.message}`;
    log('err', 'ble', `failed at step: ${err.message}`);
  }
}

function onBleNotification(event) {
  const dv = event.target.value;
  const data = new Uint8Array(dv.buffer, dv.byteOffset, dv.byteLength);
  log('in', 'ble', `notification: ${data.length} bytes, flags=0x${data[0]?.toString(16)}`);
  const json = S.bleDefrag.push(data);
  if (json) {
    log('in', 'ble', `assembled: ${json.length} chars`);
    try { handleMessage(JSON.parse(json), null); } catch (e) { log('err', 'ble', `parse error: ${e.message}`); }
  }
}

function onBleDisconnect() {
  if (S.intentionalClose) return;
  log('err', 'ble', 'disconnected');
  bleStatusEl.textContent = 'BLE disconnected';
  setPhase('closed');
}

// ---------------------------------------------------------------------------
// BLE: create channel locally (dApp is its own adapter in BLE mode)
// ---------------------------------------------------------------------------

function freshConnectBle() {
  S.intentionalClose = false;
  S.transport = 'ble';
  S.privKey = x25519.utils.randomPrivateKey();
  S.pubKey = x25519.getPublicKey(S.privKey);
  S.pubKeyB64 = b64urlEncode(S.pubKey);
  S.channelId = bytesToHex(crypto.getRandomValues(new Uint8Array(32)));
  S.sendSeq = 0;
  S.remotePubKey = null;
  S.sessionKey = null;
  S.reqCounter = 0;
  S.paired = false;
  S.resumeToken = null;

  // Local adapter: self-generate ready.waiting
  setPhase('waiting');
  log('in', 'ready', 'state=waiting (BLE local adapter)');

  // Show QR without relay param (signals BLE mode to wallet)
  const uri = `walletpair:?ch=${S.channelId}&pubkey=${S.pubKeyB64}`;
  pairingUriEl.textContent = uri;
  renderQR(uri);
  btnBleScan.disabled = false;
  bleStatusEl.textContent = 'Show QR to wallet, then click Scan';
  saveState();
}

// ---------------------------------------------------------------------------
// Fresh connect via WebSocket (first time)
// ---------------------------------------------------------------------------
function freshConnect() {
  S.intentionalClose = false;
  S.privKey = x25519.utils.randomPrivateKey();
  S.pubKey = x25519.getPublicKey(S.privKey);
  S.pubKeyB64 = b64urlEncode(S.pubKey);
  S.channelId = bytesToHex(crypto.getRandomValues(new Uint8Array(32)));
  S.sendSeq = 0;
  S.remotePubKey = null;
  S.sessionKey = null;
  S.reqCounter = 0;
  S.paired = false;
  S.resumeToken = null;

  S.ws = openWs(() => {
    setPhase('waiting');
    sendRaw({ v: 1, t: 'create', ch: S.channelId, from: S.pubKeyB64, pubkey: S.pubKeyB64 });
    const uri = `walletpair:?ch=${S.channelId}&pubkey=${S.pubKeyB64}&relay=${encodeURIComponent(relayUrlEl.value)}`;
    pairingUriEl.textContent = uri;
    renderQR(uri);
    saveState();
  });
}

// ---------------------------------------------------------------------------
// Reconnect loop: resume → fallback fresh create (same channel + keys)
// ---------------------------------------------------------------------------
let reconnectTimer = null;

function startReconnect() {
  setPhase('reconnecting');
  let attempt = 0;

  function tryOnce() {
    if (S.intentionalClose || S.phase === 'closed') return;
    const delay = BACKOFF[Math.min(attempt, BACKOFF.length - 1)];
    log('in', 'reconnect', `attempt ${attempt + 1} in ${delay}ms`);
    reconnectTimer = setTimeout(() => doAttempt(attempt++), delay);
  }

  function doAttempt(n) {
    if (S.intentionalClose || S.phase === 'closed') return;
    const useResume = n === 0 && S.resumeToken; // first attempt: try resume

    S.ws = openWs(() => {
      if (useResume) {
        // Try resume
        sendRaw({ v: 1, t: 'create', ch: S.channelId, from: S.pubKeyB64, pubkey: S.pubKeyB64, resume: S.resumeToken });
      } else {
        // Fresh create with same channel & keys (relay forgot us)
        sendRaw({ v: 1, t: 'create', ch: S.channelId, from: S.pubKeyB64, pubkey: S.pubKeyB64 });
      }
    });

    // If WS fails to connect, the onclose handler will be called.
    // We override onclose temporarily for this attempt:
    const origOnclose = S.ws.onclose;
    S.ws.onclose = () => {
      if (S.intentionalClose || S.phase === 'closed') return;
      // Connection failed, retry
      tryOnce();
    };
    // Once we get any message, restore normal onclose
    const origOnmessage = S.ws.onmessage;
    S.ws.onmessage = (event) => {
      S.ws.onclose = origOnclose;     // restore normal onclose
      S.ws.onmessage = origOnmessage; // restore normal onmessage
      origOnmessage(event);            // process this message normally

      // Check if reconnect succeeded
      const msg = JSON.parse(event.data);
      if (msg.t === 'close' && msg.reason === 'invalid_resume') {
        // Resume failed (relay restarted). Retry immediately without resume.
        log('in', 'reconnect', 'resume rejected, re-creating channel');
        S.resumeToken = null;
        S.ws.onclose = () => {}; // suppress close handler
        S.ws.close();
        doAttempt(1); // force no-resume path
      } else if (msg.t === 'close' && msg.reason === 'channel_exists') {
        // Race condition: our old connection might still be lingering.
        // Wait and retry.
        tryOnce();
      }
      // If we got ready.waiting or ready.connected, reconnect is done!
      // The normal message handler already processes it.
    };
  }

  tryOnce();
}

function stopReconnect() {
  if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
}

// ---------------------------------------------------------------------------
// Message handling
// ---------------------------------------------------------------------------
function handleMessage(msg, ws) {
  switch (msg.t) {
    case 'ready':
      S.resumeToken = msg.resume;
      stopReconnect();
      if (msg.state === 'waiting') {
        setPhase('waiting');
        log('in', 'ready', 'state=waiting');
        // Show pairing URI (in case of reconnect, re-display it)
        const uri = `walletpair:?ch=${S.channelId}&pubkey=${S.pubKeyB64}&relay=${encodeURIComponent(relayUrlEl.value)}`;
        pairingUriEl.textContent = uri;
        renderQR(uri);
      } else if (msg.state === 'connected') {
        log('in', 'ready', `state=connected remote=${msg.remote?.slice(0, 12)}...`);
        setPhase('connected');
      }
      saveState();
      break;

    case 'join': {
      const joinPubKey = msg.from;
      log('in', 'join', `peer=${joinPubKey?.slice(0, 12)}... chains=${JSON.stringify(msg.capabilities?.chains || [])}`);

      // Derive session key from the wallet's public key
      const remoteBytes = b64urlDecode(joinPubKey);

      // Check: is this the same wallet we already paired with?
      const knownWallet = S.paired && S.remotePubKey && b64urlEncode(S.remotePubKey) === joinPubKey;

      S.remotePubKey = remoteBytes;
      const shared = x25519.getSharedSecret(S.privKey, S.remotePubKey);
      S.sessionKey = deriveSessionKey(shared, S.channelId);

      // BLE adapter duty: send ready.waiting to the wallet
      if (S.transport === 'ble') {
        sendViaBle({ v: 1, t: 'ready', ch: S.channelId, state: 'waiting', role: 'wallet', self: joinPubKey, resume: crypto.randomUUID() });
      }

      if (knownWallet) {
        // Auto-accept: same wallet reconnected after relay restart
        log('in', 'auto_accept', 'known wallet, skipping pairing code');
        doAccept();
      } else {
        // First time: show pairing code for manual verification
        const code = computePairingCode(S.sessionKey, S.channelId);
        pairingCodeEl.textContent = code;
        setPhase('pending_accept');
      }
      saveState();
      break;
    }

    case 'res': {
      let detail = `id=${msg.id} ok=${msg.ok}`;
      if (msg.sealed && S.sessionKey) {
        try {
          const { data } = unsealPayload(S.sessionKey, S.channelId, msg.sealed);
          detail += ` ${JSON.stringify(data)}`;
        } catch { detail += ' (decrypt failed)'; }
      }
      log('in', 'res', detail);
      break;
    }

    case 'evt': {
      let detail = `event=${msg.event}`;
      if (msg.sealed && S.sessionKey) {
        try {
          const { data } = unsealPayload(S.sessionKey, S.channelId, msg.sealed);
          detail += ` ${JSON.stringify(data)}`;
        } catch { detail += ' (decrypt failed)'; }
      }
      log('in', 'evt', detail);
      break;
    }

    case 'ping':
      log('in', 'ping', `ts=${msg.ts}`);
      sendRaw({ v: 1, t: 'pong', ch: S.channelId, from: S.pubKeyB64, ts: Date.now() });
      break;

    case 'pong':
      log('in', 'pong', `ts=${msg.ts}`);
      break;

    case 'close':
      log('err', 'close', `reason=${msg.reason}`);
      // Don't set closed if we're in reconnect flow handling
      if (S.phase !== 'reconnecting') {
        setPhase('closed');
        S.intentionalClose = true;
      }
      break;

    default:
      log('in', msg.t || '?', JSON.stringify(msg).slice(0, 120));
  }
}

// ---------------------------------------------------------------------------
// Actions
// ---------------------------------------------------------------------------
function doAccept() {
  if (S.phase !== 'pending_accept' || !S.remotePubKey) return;
  S.paired = true;
  const walletPubB64 = b64urlEncode(S.remotePubKey);

  if (S.transport === 'ble') {
    // BLE mode: dApp IS the adapter. Generate ready.connected for both sides.
    // Send ready.connected to wallet via BLE
    sendViaBle({ v: 1, t: 'ready', ch: S.channelId, state: 'connected', role: 'wallet', self: walletPubB64, remote: S.pubKeyB64, resume: crypto.randomUUID() });
    // Self-process ready.connected (local adapter → dApp)
    handleMessage({ t: 'ready', state: 'connected', role: 'dapp', self: S.pubKeyB64, remote: walletPubB64, resume: crypto.randomUUID(), ch: S.channelId, v: 1 }, null);
  } else {
    // WS mode: relay handles ready generation, just send accept
    sendRaw({ v: 1, t: 'accept', ch: S.channelId, from: S.pubKeyB64, target: walletPubB64 });
  }
  saveState();
}

function doReject() {
  if (!S.remotePubKey) return;
  sendRaw({ v: 1, t: 'close', ch: S.channelId, from: S.pubKeyB64, target: b64urlEncode(S.remotePubKey), reason: 'user_rejected' });
  doFullClose();
}

function doSendRequest() {
  if (S.phase !== 'connected') return;
  const method = methodSel.value === 'custom' ? prompt('Method name:') : methodSel.value;
  if (!method) return;
  let params;
  try { params = JSON.parse(paramsEl.value); } catch { alert('Invalid JSON params'); return; }
  const id = `req-${++S.reqCounter}`;
  const msg = { v: 1, t: 'req', ch: S.channelId, id, from: S.pubKeyB64, method };
  if (Object.keys(params).length > 0) {
    msg.sealed = sealPayload(S.sessionKey, S.channelId, S.sendSeq++, params);
  }
  sendRaw(msg);
  saveState();
}

function doPing() {
  if (S.phase !== 'connected') return;
  sendRaw({ v: 1, t: 'ping', ch: S.channelId, from: S.pubKeyB64, ts: Date.now() });
}

function doFullClose() {
  S.intentionalClose = true;
  stopReconnect();
  if (S.channelId) {
    sendRaw({ v: 1, t: 'close', ch: S.channelId, from: S.pubKeyB64, reason: 'normal' });
  }
  // BLE cleanup
  if (S.bleDevice && S.bleDevice.gatt?.connected) {
    S.bleDevice.gatt.disconnect();
  }
  S.bleDevice = null; S.bleWriteChar = null; S.bleNotifyChar = null;
  S.bleDefrag.reset();
  setPhase('closed');
  clearState();
}

function doReset() {
  doFullClose();
  S.channelId = null;
  S.paired = false;
  S.transport = 'ws';
  setPhase('idle');
  pairingUriEl.textContent = '--';
  qrCanvas.style.display = 'none';
  bleStatusEl.textContent = '';
  btnBleScan.disabled = true;
}

// ---------------------------------------------------------------------------
// Event bindings
// ---------------------------------------------------------------------------
// Transport mode switching
function setTransportMode(mode) {
  S.transport = mode;
  btnModeWs.className = mode === 'ws' ? 'primary' : '';
  btnModeBle.className = mode === 'ble' ? 'primary' : '';
  wsConfig.classList.toggle('hidden', mode !== 'ws');
  bleConfig.classList.toggle('hidden', mode !== 'ble');
  if (mode === 'ble' && !WEB_BLE_SUPPORTED) {
    bleStatusEl.textContent = 'Web Bluetooth not supported in this browser (use Chrome)';
    btnBleCreate.disabled = true;
  }
}
btnModeWs.onclick = () => setTransportMode('ws');
btnModeBle.onclick = () => setTransportMode('ble');

btnConnect.onclick = freshConnect;
btnBleCreate.onclick = freshConnectBle;
btnBleScan.onclick = bleConnect;
btnReset.onclick = doReset;
btnCopy.onclick = () => { navigator.clipboard.writeText(pairingUriEl.textContent); btnCopy.textContent = 'Copied!'; setTimeout(() => btnCopy.textContent = 'Copy URI', 1500); };
btnAccept.onclick = doAccept;
btnReject.onclick = doReject;
btnSend.onclick = doSendRequest;
btnPing.onclick = doPing;
btnClose.onclick = doFullClose;
methodSel.onchange = () => {
  if (methodSel.value === 'wallet_signMessage') paramsEl.value = '{"message": "Hello WalletPair!"}';
  else paramsEl.value = '{}';
};

// ---------------------------------------------------------------------------
// On page load: restore session if available (WS only — BLE is not resumable)
// ---------------------------------------------------------------------------
if (loadState()) {
  log('in', 'restore', `restored session ch=${S.channelId.slice(0, 12)}... paired=${S.paired}`);
  const restoredUri = `walletpair:?ch=${S.channelId}&pubkey=${S.pubKeyB64}&relay=${encodeURIComponent(relayUrlEl.value)}`;
  pairingUriEl.textContent = restoredUri;
  renderQR(restoredUri);
  setTransportMode('ws');
  startReconnect();
}
</script>
</body>
</html>
