name: Release Relay

on:
  push:
    tags:
      - 'relay-v*'

permissions:
  contents: write
  packages: write

concurrency:
  group: release-relay-${{ github.ref }}
  cancel-in-progress: false

jobs:
  binary:
    name: Build Linux x86_64 binary
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: walletpair-relay
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            walletpair-relay/target
          key: release-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('walletpair-relay/Cargo.lock') }}
      - name: Verify tag matches Cargo version
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#relay-v}"
          cargo_version="$(cargo metadata --locked --no-deps --format-version 1 | jq --raw-output '.packages[] | select(.name == "walletpair-relay") | .version')"
          test "$tag_version" = "$cargo_version"
      - name: Build release binary
        run: cargo build --release --locked
      - name: Package binary and checksum
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#relay-}"
          asset="walletpair-relay-${version}-x86_64-unknown-linux-gnu.tar.gz"
          mkdir -p dist/package
          cp target/release/walletpair-relay dist/package/walletpair-relay
          tar -C dist/package -czf "dist/${asset}" walletpair-relay
          (cd dist && sha256sum "$asset" > SHA256SUMS)
      - uses: actions/upload-artifact@v4
        with:
          name: walletpair-relay-release-assets
          path: |
            walletpair-relay/dist/*.tar.gz
            walletpair-relay/dist/SHA256SUMS
          if-no-files-found: error
          retention-days: 7

  docker:
    name: Publish multi-platform Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Resolve image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/walletpair-relay" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=match,pattern=relay-v(.*),group=1
            type=ref,event=tag
            type=raw,value=latest
      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: walletpair-relay
          file: walletpair-relay/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha,scope=walletpair-relay-release
          cache-to: type=gha,mode=max,scope=walletpair-relay-release
          provenance: mode=max
          sbom: true

  github-release:
    name: Publish GitHub release
    needs: [binary, docker]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: walletpair-relay-release-assets
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
