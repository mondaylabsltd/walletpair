name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  extension:
    name: Extension (check + test + Chrome/Firefox builds)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: walletpair-extension
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: walletpair-extension/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Type / Svelte check
        run: pnpm check
      - name: Test
        run: pnpm test
      - name: Build Chrome MV3
        run: pnpm build
      - name: Build Firefox
        run: pnpm build:firefox

  relay-rust:
    name: Relay (format + clippy + test + release binary)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: walletpair-relay
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            walletpair-relay/target
          key: ${{ runner.os }}-${{ runner.arch }}-relay-cargo-${{ hashFiles('walletpair-relay/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-relay-cargo-
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings
      - name: Test
        run: cargo test --all-targets --locked
        env:
          RUST_LOG: warn
      - name: Build release binary
        run: cargo build --release --locked
      - name: Upload Linux x86_64 binary
        uses: actions/upload-artifact@v4
        with:
          name: walletpair-relay-linux-x86_64-${{ github.sha }}
          path: walletpair-relay/target/release/walletpair-relay
          if-no-files-found: error
          retention-days: 7

  relay-docker:
    name: Relay Docker (build + smoke test)
    needs: relay-rust
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose configuration
        working-directory: walletpair-relay
        run: docker compose config --quiet
      - uses: docker/setup-buildx-action@v4
      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: walletpair-relay
          file: walletpair-relay/Dockerfile
          load: true
          push: false
          tags: walletpair-relay:ci
          cache-from: type=gha,scope=walletpair-relay
          cache-to: type=gha,mode=max,scope=walletpair-relay
      - name: Smoke test image
        run: |
          set -euo pipefail
          docker run --detach --name walletpair-relay-ci --publish 127.0.0.1:3000:3000 walletpair-relay:ci
          for attempt in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:3000/healthz >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker logs walletpair-relay-ci
          exit 1
      - name: Remove smoke-test container
        if: always()
        run: docker rm --force walletpair-relay-ci || true

  website:
    name: Website (check + unit tests + build)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: walletpair.org
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: walletpair.org/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Type / Svelte check
        run: pnpm check
      - name: Unit tests
        run: pnpm test:unit -- --run
      - name: Build (wrangler types + vite build)
        run: pnpm build
